name: CI

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ matrix.python-version }}
      # All extras EXCEPT the two that bundle torch + transformers (the `nli` extra and the `all`
      # meta-extra both pull them). The optional NLI floor is a slow, heavy install and its tests are
      # written to run torch-free (tests/unit/test_nli.py exercises only the gate + graceful-absence
      # paths); installing it made those ignores/tests environment-dependent and reddened CI. Keep CI
      # lean and torch-free. The provider/mcp/http extras are still installed individually.
      - run: uv sync --all-extras --no-extra nli --no-extra all
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/
      - run: uv run pytest --tb=short
