name: CI

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      # All extras EXCEPT the heavy optional ones: `nli`/`all` bundle torch + transformers, and
      # `bench` pulls HuggingFace `datasets` (+ pyarrow). All three have tests written to run
      # WITHOUT the extra (test_nli.py is torch-free; test_codejudgebench.py uses the committed
      # offline fixture, no `datasets`), so installing them only slows/reddens CI. Keep CI lean.
      # The provider/mcp/http extras are still installed individually.
      - run: uv sync --all-extras --no-extra nli --no-extra all --no-extra bench
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/
      - run: uv run pytest --tb=short
